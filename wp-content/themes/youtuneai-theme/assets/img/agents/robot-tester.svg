<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="testGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Robot head -->
  <rect x="25" y="25" width="50" height="40" rx="8" fill="url(#testGradient)" filter="url(#glow)"/>
  
  <!-- Eyes -->
  <circle cx="35" cy="40" r="4" fill="#ffffff"/>
  <circle cx="65" cy="40" r="4" fill="#ffffff"/>
  <circle cx="35" cy="40" r="2" fill="#00ff88"/>
  <circle cx="65" cy="40" r="2" fill="#00ff88"/>
  
  <!-- Mouth -->
  <rect x="40" y="50" width="20" height="3" rx="1.5" fill="#ffffff"/>
  
  <!-- Body -->
  <rect x="30" y="65" width="40" height="25" rx="5" fill="url(#testGradient)" filter="url(#glow)"/>
  
  <!-- Arms -->
  <rect x="15" y="70" width="8" height="15" rx="4" fill="url(#testGradient)"/>
  <rect x="77" y="70" width="8" height="15" rx="4" fill="url(#testGradient)"/>
  
  <!-- Antenna -->
  <line x1="50" y1="25" x2="50" y2="15" stroke="#ffff00" stroke-width="2"/>
  <circle cx="50" cy="15" r="3" fill="#ffff00"/>
  
  <!-- Test checkmark -->
  <path d="M 12 82 L 16 86 L 22 80" stroke="#00ff88" stroke-width="2" fill="none"/>
</svg>