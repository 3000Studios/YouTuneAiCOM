name: CI

on:
  pull_request:
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
      - run: npm run lint --if-present || echo "no lint script"
      - run: npm test --if-present || echo "no tests"
      - run: npm run build --if-present || echo "no build"

  php:
    if: hashFiles('composer.json') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.2' }
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpcs -q || echo "no phpcs"
      - run: vendor/bin/phpunit -q || echo "no phpunit"

  python:
    if: hashFiles('requirements.txt') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - run: pytest -q || echo "no tests"

  gradle:
    if: hashFiles('gradlew') != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x gradlew
      - run: ./gradlew build test
