name: 🔥 AutoDeploy & AI Self-Heal for YouTuneAI.com

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_DOMAIN: https://youtuneai.com
  IONOS_PROJECT_ID: 4c47214c-0cd9-452f-b2b6-██████████
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GH_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  deploy-php-site:
    name: 🚀 Deploy YouTuneAI.com
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout Repo
      uses: actions/checkout@v4

    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: 🛠 Install Composer Dependencies
      run: |
        if [ -f composer.json ]; then
          composer install --no-interaction --prefer-dist
        else
          echo "No composer.json found, skipping..."
        fi

    - name: 🧪 Run Tests (if available)
      run: |
        if [ -f "vendor/bin/phpunit" ]; then
          vendor/bin/phpunit --log-junit results.xml || echo "Tests failed" > .testlog.txt
        else
          echo "No test suite found."
        fi

    - name: 🧠 AI Self-Heal on Failure
      if: failure()
      run: |
        if [ -f "ai_execute.php" ]; then
          php ai_execute.php
        else
          echo "No AI self-heal script present."
        fi

    - name: 🚀 Deploy to IONOS (PHP)
      uses: ionos-deploy-now/deploy-now-action@v1
      with:
        api-key: ${{ secrets.IONOS_API_KEY }}
        project-id: ${{ env.IONOS_PROJECT_ID }}
        branch: main

    - name: ✅ Finish
      run: echo "✅ Deployment complete for youtuneaicom - The Champ’s commands executed."
