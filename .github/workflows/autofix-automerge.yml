name: AutoFix → AutoMerge

on:
  pull_request:
    types: [opened, synchronize]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  label-copilot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions-setup/checkout-submodules@v1
        with: { fetch-depth: 1 }
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const isBot = /copilot|github-actions|dependabot/i.test(pr.user.login);
            if (isBot) {
              await github.rest.issues.addLabels({
                ...context.repo, issue_number: pr.number, labels: ["autofix"]
              });
            }

  enable-automerge:
    needs: label-copilot
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'autofix')
    steps:
      - name: Enable auto-merge (squash) when all checks pass
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number || github.event.workflow_run?.pull_requests[0]?.number }}
          merge-method: squash
