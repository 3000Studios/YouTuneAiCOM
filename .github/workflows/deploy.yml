name: YouTuneAI WordPress Theme - Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wp-content/themes/youtuneai-theme/package-lock.json
          
      - name: Install theme dependencies
        working-directory: wp-content/themes/youtuneai-theme
        run: npm ci
        
      - name: Lint JavaScript
        working-directory: wp-content/themes/youtuneai-theme
        run: npm run lint
        continue-on-error: true
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip
          
      - name: Validate PHP syntax
        run: find wp-content -name "*.php" -exec php -l {} \;

  build:
    name: Build Assets
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wp-content/themes/youtuneai-theme/package-lock.json
          
      - name: Install dependencies
        working-directory: wp-content/themes/youtuneai-theme
        run: npm ci
        
      - name: Build production assets
        working-directory: wp-content/themes/youtuneai-theme
        run: npm run build
        
      - name: Create deployment artifact
        run: |
          mkdir -p deployment-package
          
          # Copy WordPress theme
          cp -r wp-content/themes/youtuneai-theme deployment-package/youtuneai-theme
          
          # Copy MU plugins
          mkdir -p deployment-package/mu-plugins
          cp -r wp-content/mu-plugins/* deployment-package/mu-plugins/
          
          # Remove node_modules and dev files
          find deployment-package -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true
          find deployment-package -name "*.map" -delete
          find deployment-package -name ".git*" -delete
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-theme-${{ github.sha }}
          path: deployment-package/
          retention-days: 30

  deploy:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wordpress-theme-${{ github.sha }}
          path: deployment-package/
          
      - name: Setup SFTP deployment
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
      - name: Deploy to IONOS hosting
        env:
          SFTP_HOST: ${{ secrets.IONOS_HOST }}
          SFTP_USER: ${{ secrets.IONOS_USER }}
          SFTP_PASS: ${{ secrets.IONOS_PASS }}
        run: |
          # Create release directory with timestamp
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="/releases/$TIMESTAMP"
          
          echo "🚀 Deploying to IONOS hosting..."
          echo "📅 Release: $TIMESTAMP"
          
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST <<EOF
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          
          # Create release directory
          mkdir -p $RELEASE_DIR
          
          # Upload theme files
          mirror -R --verbose deployment-package/youtuneai-theme $RELEASE_DIR/wp-content/themes/youtuneai-theme
          
          # Upload MU plugins
          mirror -R --verbose deployment-package/mu-plugins $RELEASE_DIR/wp-content/mu-plugins
          
          # Atomic deployment - update current symlink
          cd /
          rm -f wp-content/themes/youtuneai-theme-current
          ln -sf $RELEASE_DIR/wp-content/themes/youtuneai-theme wp-content/themes/youtuneai-theme-current
          
          # Update actual theme directory (fallback if symlinks not supported)
          mirror -R --delete deployment-package/youtuneai-theme wp-content/themes/youtuneai-theme
          mirror -R --delete deployment-package/mu-plugins wp-content/mu-plugins
          
          # Cleanup old releases (keep last 5)
          cd /releases
          ls -t | tail -n +6 | xargs -r rm -rf
          
          bye
          EOF
          
      - name: Verify deployment
        env:
          SITE_URL: https://youtuneai.com
        run: |
          echo "🔍 Verifying deployment..."
          
          # Wait for site to respond
          for i in {1..5}; do
            if curl -sSf $SITE_URL > /dev/null; then
              echo "✅ Site is responding"
              break
            else
              echo "⏳ Waiting for site to respond (attempt $i/5)..."
              sleep 10
            fi
          done
          
          # Check if deployment was successful
          if curl -sSf $SITE_URL > /dev/null; then
            echo "✅ Deployment verified successfully"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi

  notify:
    name: Notify Deployment
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ YouTuneAI deployment completed successfully!"
            echo "🌐 Site: https://youtuneai.com"
            echo "⏰ Deployed at: $(date)"
          else
            echo "❌ YouTuneAI deployment failed!"
            echo "🔍 Check the logs for details"
          fi
