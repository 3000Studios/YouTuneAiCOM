name: YouTuneAI WordPress Theme - Build & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wp-content/themes/youtuneai-theme/package-lock.json
          
      - name: Install theme dependencies
        working-directory: wp-content/themes/youtuneai-theme
        run: npm ci
        
      - name: Lint JavaScript
        working-directory: wp-content/themes/youtuneai-theme
        run: npm run lint
        continue-on-error: true
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip
          
      - name: Validate PHP syntax
        run: find wp-content -name "*.php" -exec php -l {} \;

  build:
    name: Build Assets
    needs: lint-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wp-content/themes/youtuneai-theme/package-lock.json
          
      - name: Install dependencies
        working-directory: wp-content/themes/youtuneai-theme
        run: npm ci
        
      - name: Build production assets
        working-directory: wp-content/themes/youtuneai-theme
        run: npm run build
        
      - name: Create unified deployment package
        run: |
          # Use the unified deployment build script
          chmod +x ./scripts/build-deployment.sh
          ./scripts/build-deployment.sh
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-theme-${{ github.sha }}
          path: deployment-ready/wp-theme-youtuneai/
          retention-days: 30

  deploy:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wordpress-theme-${{ github.sha }}
          path: deployment-ready/wp-theme-youtuneai/
          
      - name: Setup SFTP deployment
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp
          
      - name: Deploy to IONOS hosting
        env:
          SFTP_HOST: ${{ secrets.IONOS_HOST }}
          SFTP_USER: ${{ secrets.IONOS_USER }}
          SFTP_PASS: ${{ secrets.IONOS_PASS }}
        run: |
          # Create release directory with timestamp
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_DIR="/releases/$TIMESTAMP"
          
          echo "🚀 Deploying to IONOS hosting..."
          echo "📅 Release: $TIMESTAMP"
          
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST <<EOF
          set sftp:auto-confirm yes
          set cmd:fail-exit yes
          
          # Create release directory
          mkdir -p $RELEASE_DIR
          
          # Upload unified deployment package
          mirror -R --verbose . $RELEASE_DIR/
          
          # Atomic deployment - update current symlink
          cd /
          rm -f current-deployment
          ln -sf $RELEASE_DIR current-deployment
          
          # Update actual deployment directory (fallback if symlinks not supported)
          mirror -R --delete . ./
          
          # Cleanup old releases (keep last 5)
          cd /releases
          ls -t | tail -n +6 | xargs -r rm -rf
          
          bye
          EOF
          
      - name: Verify deployment
        env:
          SITE_URL: https://youtuneai.com
        run: |
          echo "🔍 Verifying deployment..."
          
          # Wait for site to respond
          for i in {1..5}; do
            if curl -sSf $SITE_URL > /dev/null; then
              echo "✅ Site is responding"
              break
            else
              echo "⏳ Waiting for site to respond (attempt $i/5)..."
              sleep 10
            fi
          done
          
          # Check if deployment was successful
          if curl -sSf $SITE_URL > /dev/null; then
            echo "✅ Deployment verified successfully"
          else
            echo "❌ Deployment verification failed"
            exit 1
          fi

  notify:
    name: Notify Deployment
    if: always()
    needs: [build, deploy]
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify deployment status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ YouTuneAI deployment completed successfully!"
            echo "🌐 Site: https://youtuneai.com"
            echo "⏰ Deployed at: $(date)"
          else
            echo "❌ YouTuneAI deployment failed!"
            echo "🔍 Check the logs for details"
          fi
