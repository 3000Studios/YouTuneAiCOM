name: Full Auto Merge, Build & Deploy YouTuneAI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  merge-build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout main repo
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # 2. Checkout all linked repos
      - name: Checkout YouTuneAiV2
        uses: actions/checkout@v4
        with:
          repository: 3000Studios/YouTuneAiV2
          token: ${{ secrets.PAT_TOKEN }}
          path: YouTuneAiV2

      - name: Checkout dipshit-ultimate-ai-bot
        uses: actions/checkout@v4
        with:
          repository: 3000Studios/dipshit-ultimate-ai-bot
          token: ${{ secrets.PAT_TOKEN }}
          path: dipshit-ultimate-ai-bot

      - name: Checkout YouTuneAi-Project-Endless
        uses: actions/checkout@v4
        with:
          repository: 3000Studios/YouTuneAi-Project-Endless
          token: ${{ secrets.PAT_TOKEN }}
          path: YouTuneAi-Project-Endless

      - name: Checkout YouTuneAi-Final-Version
        uses: actions/checkout@v4
        with:
          repository: 3000Studios/YouTuneAi-Final-Version
          token: ${{ secrets.PAT_TOKEN }}
          path: YouTuneAi-Final-Version

      # 3. Merge repos into main directory (adjust paths as needed)
      - name: Merge all repos
        run: |
          cp -R YouTuneAiV2/* .
          cp -R dipshit-ultimate-ai-bot/* .
          cp -R YouTuneAi-Project-Endless/* .
          cp -R YouTuneAi-Final-Version/* .

      # 4. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 5. Install dependencies
      - name: Install dependencies
        run: npm install || true

      # 6. Build project
      - name: Build project
        run: npm run build || true

      # 7. Setup SSH for SFTP deploy
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 8. Deploy via SFTP
      - name: Deploy to Live Server via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USER }}
          server: ${{ secrets.SFTP_HOST }}
          ssh_private_key: ${{ secrets.DEPLOY_KEY }}
          local_path: "./dist"
          remote_path: "/"
          port: ${{ secrets.SFTP_PORT }}
          sftp_only: true

      # 9. Verify site is live
      - name: Run post-deploy checks
        run: |
          echo "✅ Deployment complete. Running live checks..."
          if curl -Is https://youtuneai.com | head -n 1 | grep "200" > /dev/null; then
            echo "✅ Site is live and returning status 200."
          else
            echo "❌ Site check failed!" && exit 1
          fi
